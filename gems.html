<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gem Merge — Stash Snapshot</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Same dark-fantasy palette as index.html, kept standalone (no shared
     CSS file) so this page has zero dependency on the Summoner/Warlock
     dashboard's bot-switcher machinery. */
  body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #15110d; color: #d8c9a8; }
  h2, h3, strong { font-family: 'Cinzel', serif; }
  a { color: #f0d878; }
  .panel { border: 1px solid #4a3a24; background: #1c1610; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .top-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .scanned-at { font-size: 13px; color: #a8916a; }
  .back-link { font-size: 13px; }
  .empty-state { text-align: center; padding: 2.5rem 1rem; color: #a8916a; }

  table.gem-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.gem-table th, table.gem-table td { text-align: center; padding: 8px 6px; border: 1px solid #3a2e1e; }
  table.gem-table thead th { color: #a8916a; font-weight: 500; font-family: 'Cinzel', serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; padding-bottom: 6px; }
  table.gem-table tbody th { text-align: left; color: #a8916a; font-family: 'Cinzel', serif; font-weight: 500; white-space: nowrap; padding-right: 10px; }
  table.gem-table td.gem-cell { background: #221a12; color: #d8c9a8; font-size: 16px; font-weight: 600; position: relative; }
  table.gem-table td.gem-cell.zero { color: #4a3f30; font-weight: 400; }
  table.gem-table tr.perfect-row td.gem-cell { background: linear-gradient(160deg, #3a2410, #221a12); color: #f0d878; }
  table.gem-table tr.perfect-row td.gem-cell.zero { color: #6a5a3a; }
  table.gem-table tr.perfect-row th { color: #f0d878; }
  td.gem-cell.ambiguous { box-shadow: inset 0 0 0 2px #c9a227; }
  td.gem-cell .alt-note { display: block; font-size: 10px; font-weight: 400; color: #c9a227; margin-top: 2px; }

  .gem-icon { display: inline-block; width: 22px; height: 22px; object-fit: contain; margin-bottom: 4px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
  td.gem-cell .gem-icon { width: 18px; height: 18px; margin-bottom: 2px; }

  .legend-note { font-size: 12px; color: #a8916a; margin-top: 10px; }
  .legend-note .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; box-shadow: inset 0 0 0 2px #c9a227; margin: 0 4px -1px 10px; }

  @media (max-width: 640px) {
    body { font-size: 15px; padding: 0 0.75rem; margin: 1rem auto; }
    table.gem-table { font-size: 12px; }
    table.gem-table th, table.gem-table td { padding: 5px 3px; }
    .gem-icon { width: 16px; height: 16px; }
  }
</style>
</head>
<body>

<div class="top-row">
  <h2 style="margin:0;">Gem Merge — Stash Snapshot</h2>
  <a class="back-link" href="index.html">&larr; Back to main dashboard</a>
</div>

<div class="panel">
  <div id="scannedAt" class="scanned-at">Loading…</div>
  <div id="content"></div>
</div>

<script>
const SUPABASE_URL = "https://vvsuibcrudmckruervwl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_rCe50ZuheZbLbNgIB8PjNQ_ec8cS2JP";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Same order as gem_merge.py's GEM_NAMES / TIER_NAMES -- the grid/alts jsonb
// columns are plain 5x7 nested arrays in this exact order, no per-cell labels.
const GEM_NAMES = ["Diamond", "Emerald", "Ruby", "Topaz", "Amethyst", "Sapphire", "Skull"];
// File-name stems on d2r.world (note their "saphire" spelling) -- used to build
// assets/gems/{tierPrefix}{gemFile}.png paths, downloaded from
// https://static.d2r.world/img/items/recipes/{tierPrefix}{gemFile}.png
const GEM_FILES = ["diamond", "emerald", "ruby", "topaz", "amethyst", "saphire", "skull"];
const TIER_NAMES = ["Chipped", "Flawed", "Regular", "Flawless", "Perfect"];
const TIER_FILE_PREFIX = ["chipped_", "flawed_", "", "flawless_", "perfect_"];

function gemIconPath(r, c) {
  return `assets/gems/${TIER_FILE_PREFIX[r]}${GEM_FILES[c]}.png`;
}

function renderTable(grid, alts) {
  let html = "<table class=\"gem-table\"><thead><tr>";
  for (let c = 0; c < GEM_NAMES.length; c++) {
    html += `<th><img class="gem-icon" src="${gemIconPath(2, c)}" alt="${GEM_NAMES[c]}"><br>${GEM_NAMES[c]}</th>`;
  }
  html += "</tr></thead><tbody>";
  for (let r = 0; r < TIER_NAMES.length; r++) {
    const rowClass = TIER_NAMES[r] === "Perfect" ? " class=\"perfect-row\"" : "";
    html += `<tr${rowClass}>`;
    for (let c = 0; c < GEM_NAMES.length; c++) {
      const value = grid[r][c];
      const alt = alts && alts[r] ? alts[r][c] : null;
      const zeroClass = value === 0 ? " zero" : "";
      const ambiguousClass = alt !== null && alt !== undefined ? " ambiguous" : "";
      const altNote = ambiguousClass ? `<span class="alt-note">or ${alt}?</span>` : "";
      html += `<td class="gem-cell${zeroClass}${ambiguousClass}"><img class="gem-icon" src="${gemIconPath(r, c)}" alt="${GEM_NAMES[c]}"><br>${value}${altNote}</td>`;
    }
    html += "</tr>";
  }
  html += "</tbody></table>";
  html += `<p class="legend-note">Rows = tier (Chipped &rarr; Perfect). A gold outline<span class="swatch"></span>marks a low-confidence digit read -- the "or X?" note is the runner-up guess; check the tool's saved screenshot if it matters.</p>`;
  return html;
}

function render(row) {
  const contentEl = document.getElementById("content");
  const scannedAtEl = document.getElementById("scannedAt");
  if (!row || !row.grid || row.grid.length === 0) {
    scannedAtEl.textContent = "";
    contentEl.innerHTML = `<div class="empty-state">No scan yet.<br>In the Gem Merge tool: click Start, open the stash Gems (寶石) tab, then press <strong>F11</strong> to scan.</div>`;
    return;
  }
  const scannedAt = new Date(row.scanned_at);
  scannedAtEl.textContent = "Last scanned: " + scannedAt.toLocaleString();
  contentEl.innerHTML = renderTable(row.grid, row.alts);
}

async function loadScan() {
  const { data, error } = await sb.from("gem_merge_scan").select("*").eq("id", 1).maybeSingle();
  if (error) {
    document.getElementById("scannedAt").textContent = "";
    document.getElementById("content").innerHTML = `<div class="empty-state">Failed to load: ${error.message}</div>`;
    return;
  }
  render(data);
}

loadScan();

// Live-update whenever the Gem Merge tool pushes a new F11 scan, no manual refresh needed.
sb.channel("gem-merge-scan-updates")
  .on("postgres_changes", { event: "*", schema: "public", table: "gem_merge_scan" }, () => loadScan())
  .subscribe();
</script>

</body>
</html>
