<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gem Merge — Stash Snapshot</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Same dark-fantasy palette as index.html, kept standalone (no shared
     CSS file) so this page has zero dependency on the Summoner/Warlock
     dashboard's bot-switcher machinery. */
  body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #15110d; color: #d8c9a8; }
  h2, h3, strong { font-family: 'Cinzel', serif; }
  a { color: #f0d878; }
  .panel { border: 1px solid #4a3a24; background: #1c1610; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .top-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .scanned-at { font-size: 13px; color: #a8916a; }
  .back-link { font-size: 13px; }
  .empty-state { text-align: center; padding: 2.5rem 1rem; color: #a8916a; }

  /* Rune-table look (see index.html's .rune-grid/.rune-box): rounded,
     gapped boxes with a big icon rather than a bordered <table> grid. */
  .gem-header-row { display: grid; grid-template-columns: repeat(7, minmax(60px, 1fr)); gap: 8px; margin-top: 10px; }
  .gem-header-row div { text-align: center; color: #a8916a; font-weight: 500; font-family: 'Cinzel', serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }

  .gem-grid { display: grid; grid-template-columns: repeat(7, minmax(60px, 1fr)); gap: 8px; margin-top: 6px; }
  .gem-box { background: #2a2018; border: 1px solid #4a3a24; border-radius: 8px; padding: 8px 4px; text-align: center; position: relative; }
  .gem-box img { width: 56px; height: 56px; object-fit: contain; display: block; margin: 0 auto 4px; opacity: 0.55; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
  .gem-box.has-count img { opacity: 1; }
  .gem-box p.gem-count { font-size: 16px; font-weight: 700; margin: 2px 0 0; color: #4a3f30; }
  .gem-box.has-count p.gem-count { color: #d8c9a8; }
  .gem-box.perfect-tier { background: linear-gradient(160deg, #3a2410, #221a12); border-color: #6a5232; }
  .gem-box.perfect-tier.has-count p.gem-count { color: #f0d878; }
  .gem-box.ambiguous { border-color: #c9a227; box-shadow: 0 0 10px rgba(201,162,39,0.4), inset 0 0 10px rgba(201,162,39,0.15); }
  .gem-box .alt-note { display: block; font-size: 10px; font-weight: 400; color: #c9a227; margin-top: 2px; }

  .gem-stats-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .gem-stat-box { flex: 1; min-width: 160px; background: linear-gradient(160deg, #3a2410, #221a12); border: 1px solid #6a5232; border-radius: 10px; padding: 10px 14px; }
  .gem-stat-box .gem-stat-label { font-size: 12px; color: #a8916a; text-transform: uppercase; letter-spacing: 0.03em; }
  .gem-stat-box .gem-stat-value { font-size: 26px; font-weight: 700; color: #f0d878; font-family: 'Cinzel', serif; }

  .legend-note { font-size: 12px; color: #a8916a; margin-top: 10px; }
  .legend-note .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; box-shadow: inset 0 0 0 2px #c9a227; margin: 0 4px -1px 10px; }

  @media (max-width: 640px) {
    body { font-size: 15px; padding: 0 0.75rem; margin: 1rem auto; }
    .gem-header-row, .gem-grid { grid-template-columns: repeat(7, minmax(38px, 1fr)); gap: 4px; }
    .gem-header-row div { font-size: 9px; }
    .gem-box { padding: 5px 2px; }
    .gem-box img { width: 34px; height: 34px; }
    .gem-box p.gem-count { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="top-row">
  <h2 style="margin:0;">Gem Merge — Stash Snapshot</h2>
  <a class="back-link" href="index.html">&larr; Back to main dashboard</a>
</div>

<div class="panel">
  <div id="scannedAt" class="scanned-at">Loading…</div>
  <div id="content"></div>
</div>

<script>
const SUPABASE_URL = "https://vvsuibcrudmckruervwl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_rCe50ZuheZbLbNgIB8PjNQ_ec8cS2JP";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Same order as gem_merge.py's GEM_NAMES / TIER_NAMES -- the grid/alts jsonb
// columns are plain 5x7 nested arrays in this exact order, no per-cell labels.
const GEM_NAMES = ["Diamond", "Emerald", "Ruby", "Topaz", "Amethyst", "Sapphire", "Skull"];
// File-name stems on d2r.world (note their "saphire" spelling) -- used to build
// assets/gems/{tierPrefix}{gemFile}.png paths, downloaded from
// https://static.d2r.world/img/items/recipes/{tierPrefix}{gemFile}.png
const GEM_FILES = ["diamond", "emerald", "ruby", "topaz", "amethyst", "saphire", "skull"];
const TIER_NAMES = ["Chipped", "Flawed", "Regular", "Flawless", "Perfect"];
const TIER_FILE_PREFIX = ["chipped_", "flawed_", "", "flawless_", "perfect_"];

function gemIconPath(r, c) {
  return `assets/gems/${TIER_FILE_PREFIX[r]}${GEM_FILES[c]}.png`;
}

function renderTable(grid, alts) {
  let html = `<div class="gem-header-row">${GEM_NAMES.map(name => `<div>${name}</div>`).join("")}</div>`;
  html += `<div class="gem-grid">`;
  for (let r = 0; r < TIER_NAMES.length; r++) {
    for (let c = 0; c < GEM_NAMES.length; c++) {
      const value = grid[r][c];
      const alt = alts && alts[r] ? alts[r][c] : null;
      const cls = ["gem-box"];
      if (value > 0) cls.push("has-count");
      if (TIER_NAMES[r] === "Perfect") cls.push("perfect-tier");
      const ambiguous = alt !== null && alt !== undefined;
      if (ambiguous) cls.push("ambiguous");
      const altNote = ambiguous ? `<span class="alt-note">or ${alt}?</span>` : "";
      html += `<div class="${cls.join(" ")}" title="${TIER_NAMES[r]} ${GEM_NAMES[c]}">
        <img src="${gemIconPath(r, c)}" alt="${GEM_NAMES[c]}">
        <p class="gem-count">${value}${altNote}</p>
      </div>`;
    }
  }
  html += `</div>`;
  html += `<p class="legend-note">Rows = tier (Chipped &rarr; Perfect). A gold outline<span class="swatch"></span>marks a low-confidence digit read -- the "or X?" note is the runner-up guess; check the tool's saved screenshot if it matters.</p>`;
  return html;
}

// Perfect is always the last row (TIER_NAMES[4]); Amethyst's column index is
// looked up by name rather than hardcoded 4, so this keeps working even if
// GEM_NAMES's order ever changes.
const PERFECT_ROW = TIER_NAMES.indexOf("Perfect");
const AMETHYST_COL = GEM_NAMES.indexOf("Amethyst");

function computeStats(grid) {
  const perfectRow = grid[PERFECT_ROW] || [];
  const totalPerfect = perfectRow.reduce((sum, v) => sum + (v || 0), 0);
  const totalPerfectNonAmethyst = perfectRow.reduce(
    (sum, v, c) => sum + (c === AMETHYST_COL ? 0 : (v || 0)), 0
  );
  return { totalPerfect, totalPerfectNonAmethyst };
}

// Same shape as index.html's fmtSeconds -- duplicated rather than shared,
// matching this page's existing "zero dependency on the other dashboard
// page" design (see the <style> block's comment up top).
function fmtSeconds(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const r = Math.round(s % 60);
  if (h > 0) return `${h}h ${m}m ${r}s`;
  return m > 0 ? `${m}m ${r}s` : `${r}s`;
}

function renderStats(grid, durationSeconds) {
  const { totalPerfect, totalPerfectNonAmethyst } = computeStats(grid);
  // 0 means this snapshot came from a plain F11 scan, not an actual merge
  // pass (see gem_merge.py's scan_only()/push_gem_scan() -- duration
  // defaults to 0 there) -- shown as a plain "0s" per that same convention,
  // not blanked out, so it's clear a scan (not a merge) produced this row.
  const durationLabel = fmtSeconds(durationSeconds || 0);
  return `<div class="gem-stats-row">
    <div class="gem-stat-box">
      <div class="gem-stat-label">Total Perfect Gems</div>
      <div class="gem-stat-value">${totalPerfect}</div>
    </div>
    <div class="gem-stat-box">
      <div class="gem-stat-label">Total Perfect (non-Amethyst)</div>
      <div class="gem-stat-value">${totalPerfectNonAmethyst}</div>
    </div>
    <div class="gem-stat-box">
      <div class="gem-stat-label">Last Merge Duration</div>
      <div class="gem-stat-value">${durationLabel}</div>
    </div>
  </div>`;
}

function render(row) {
  const contentEl = document.getElementById("content");
  const scannedAtEl = document.getElementById("scannedAt");
  if (!row || !row.grid || row.grid.length === 0) {
    scannedAtEl.textContent = "";
    contentEl.innerHTML = `<div class="empty-state">No scan yet.<br>In the Gem Merge tool: click Start, open the stash Gems (寶石) tab, then press <strong>F11</strong> to scan.</div>`;
    return;
  }
  const scannedAt = new Date(row.scanned_at);
  scannedAtEl.textContent = "Last scanned: " + scannedAt.toLocaleString();
  contentEl.innerHTML = renderStats(row.grid, row.duration_seconds) + renderTable(row.grid, row.alts);
}

async function loadScan() {
  const { data, error } = await sb.from("gem_merge_scan").select("*").eq("id", 1).maybeSingle();
  if (error) {
    document.getElementById("scannedAt").textContent = "";
    document.getElementById("content").innerHTML = `<div class="empty-state">Failed to load: ${error.message}</div>`;
    return;
  }
  render(data);
}

loadScan();

// Live-update whenever the Gem Merge tool pushes a new F11 scan, no manual refresh needed.
sb.channel("gem-merge-scan-updates")
  .on("postgres_changes", { event: "*", schema: "public", table: "gem_merge_scan" }, () => loadScan())
  .subscribe();
</script>

</body>
</html>
